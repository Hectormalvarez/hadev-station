---
# ------------------------------------------------------------------------------
# 1. Install KVM and Vagrant-Libvirt System Dependencies
# ------------------------------------------------------------------------------
- name: Install KVM and Libvirt Development Packages
  become: true
  apt:
    name: "{{ kvm_packages + vagrant_libvirt_deps }}"
    state: present
    update_cache: yes
  tags: [virtualization, kvm, libvirt]

# ------------------------------------------------------------------------------
# 2. HashiCorp Tooling Setup (Packer & Vagrant)
# ------------------------------------------------------------------------------
- name: Ensure APT Keyrings Directory Exists
  become: true
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: [hashicorp]

- name: Download HashiCorp Official GPG Key
  become: true
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /etc/apt/keyrings/hashicorp.asc
    mode: '0644'
  tags: [hashicorp]

- name: Add HashiCorp Repository
  become: true
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
    state: present
  tags: [hashicorp]

- name: Install Packer and Vagrant
  become: true
  apt:
    name:
      - packer
      - vagrant
    state: present
  tags: [hashicorp, tools]

- name: Check if Vagrant-Libvirt Plugin is Installed
  command: vagrant plugin list
  register: vagrant_plugins
  changed_when: false
  become: false
  tags: [hashicorp, vagrant]

- name: Install Vagrant-Libvirt Plugin Natively
  command: vagrant plugin install vagrant-libvirt
  when: "'vagrant-libvirt' not in vagrant_plugins.stdout"
  become: false
  tags: [hashicorp, vagrant]